services:
  database:
    image: postgres:15
    restart: unless-stopped
    container_name: e2e-database
    ports:
      - '127.0.0.1:5433:5432'
    environment:
      POSTGRES_PASSWORD: testpassword
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 3s
      timeout: 3s
      retries: 10

  graphql-server:
    image: hasura/graphql-engine:latest
    restart: unless-stopped
    container_name: e2e-graphql-server
    ports:
      - '127.0.0.1:8080:8080'
    environment:
      HASURA_GRAPHQL_ADMIN_SECRET: e2e-secret
      HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:testpassword@database:5432/postgres
      HASURA_GRAPHQL_DEV_MODE: 'true'
      HASURA_GRAPHQL_ENABLE_CONSOLE: 'true'
      HASURA_GRAPHQL_JWT_SECRET: '{"type":"HS256","key":"e2e-jwt-signing-secret-that-is-long-enough"}'
    depends_on:
      database:
        condition: service_healthy

  authelia:
    image: authelia/authelia:latest
    restart: unless-stopped
    container_name: e2e-authelia
    ports:
      - '127.0.0.1:9091:9091'
    volumes:
      - ./authelia:/config
    environment:
      AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET: insecure_hmac_secret_for_testing_only_do_not_use_in_production
